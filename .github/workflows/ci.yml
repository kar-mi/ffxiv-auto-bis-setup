name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Type-check and test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun tsc --noEmit

      - name: Test
        run: bun test
