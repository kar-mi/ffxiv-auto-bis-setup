name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  BROWSERSLIST_IGNORE_OLD_DATA: '1'

jobs:
  build:
    name: Build Windows portable zip
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Validate release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package.json version $($package.version). Expected $expectedTag."
          }

      - name: Type-check
        run: bun tsc --noEmit

      - name: Test
        run: bun test

      - name: Build portable zip
        run: bun run package:portable

      - name: Verify portable zip layout
        run: bun run verify:portable

      - name: Upload dry-run artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: portable-dry-run-${{ github.run_number }}
          path: artifacts/FFXIVGearSetup-portable-win-x64-v*.zip
          retention-days: 7

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See CHANGELOG.md for curated player-facing release notes.
          files: artifacts/FFXIVGearSetup-portable-win-x64-v*.zip
