openapi: 3.0.3
info:
  title: FFXIV Gear Setup API
  description: >
    Compares a character's packet-captured gear against Best-In-Slot (BIS)
    recommendations sourced from The Balance FFXIV and xivgear.app.
  version: 0.1.0

servers:
  - url: http://localhost:3000

tags:
  - name: item
    description: Item metadata from XIVAPI
  - name: pcap
    description: Gear snapshots from packet capture
  - name: bis
    description: Best-In-Slot sets from xivgear.app
  - name: catalog
    description: Locally stored BIS sets and per-job preferences
  - name: compare
    description: Gear vs BIS comparison
  - name: window
    description: Desktop window controls (Electrobun only)

paths:

  # ---------------------------------------------------------------------------
  # Item data
  # ---------------------------------------------------------------------------

  /item/{id}:
    get:
      tags: [item]
      summary: Get item metadata
      description: >
        Fetches item name, icon, item level, and materia slot info from XIVAPI v2.
        Results are cached for the lifetime of the process.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 49697
      responses:
        "200":
          description: Item metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemData"

  # ---------------------------------------------------------------------------
  # Packet capture
  # ---------------------------------------------------------------------------

  /pcap/gear:
    get:
      tags: [pcap]
      summary: Get latest gear snapshot
      description: >
        Returns the most recent GearSnapshot received from the packet capture
        process. Returns 404 if no snapshot has been captured yet.
      responses:
        "200":
          description: Latest captured gear
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GearSnapshot"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [pcap]
      summary: Store a gear snapshot
      description: >
        Stores a new GearSnapshot in memory. Called internally by the pcap
        child process; not intended for direct use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GearSnapshot"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ---------------------------------------------------------------------------
  # BIS
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # BIS Catalog
  # ---------------------------------------------------------------------------

  /bis/catalog:
    get:
      tags: [catalog]
      summary: Get BIS catalog
      description: >
        Returns the full local BIS catalog: all saved sets and per-job default
        preferences. The catalog is stored in `data/bis/catalog.json` and is
        committed to the repository so defaults can be shipped with the app.
      responses:
        "200":
          description: Full catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BisCatalog"

  /bis/catalog/sets:
    post:
      tags: [catalog]
      summary: Save a BIS set locally
      description: >
        Fetches a BIS set from xivgear.app and stores it in the local catalog.
        Upserting by ID is idempotent — re-saving the same (url, setIndex) pair
        refreshes the set data and updates `savedAt`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, raidTier]
              properties:
                url:
                  type: string
                  description: xivgear.app URL (normalized internally)
                  example: "https://xivgear.app/?page=bis|war|current&selectedIndex=0"
                setIndex:
                  type: integer
                  description: >
                    0-based set index. Defaults to `selectedIndex` in the URL,
                    then 0.
                  example: 0
                raidTier:
                  $ref: "#/components/schemas/RaidTier"
      responses:
        "200":
          description: The saved catalog entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalBisEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /bis/catalog/sets/{id}:
    patch:
      tags: [catalog]
      summary: Update a saved BIS set
      description: >
        Updates mutable fields of a saved set (raidTier, name). Does not
        re-fetch data from xivgear.app. At least one field is required.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "bis_war_current_0"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                raidTier:
                  $ref: "#/components/schemas/RaidTier"
                name:
                  type: string
                  description: Display name override for the set.
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalBisEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [catalog]
      summary: Remove a saved BIS set
      description: >
        Removes the entry from the catalog. Also clears any job preference
        that was pointing to this entry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "bis_war_current_0"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /bis/catalog/preferences/{job}:
    put:
      tags: [catalog]
      summary: Set default BIS set for a job
      description: >
        Marks a catalog entry as the preferred BIS set for a job. When the app
        detects this job from the soul crystal, it will auto-select and compare
        against this set.
      parameters:
        - name: job
          in: path
          required: true
          description: Uppercase job abbreviation
          schema:
            type: string
          example: "WAR"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: ID of the catalog entry to set as default
                  example: "bis_war_current_0"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [catalog]
      summary: Clear default BIS set for a job
      description: Removes the preferred set preference for a job.
      parameters:
        - name: job
          in: path
          required: true
          schema:
            type: string
          example: "WAR"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /balance/{role}/{job}:
    get:
      tags: [bis]
      summary: List BIS links for a job
      description: >
        Scrapes The Balance FFXIV for all xivgear.app BIS links for a job.
        Includes sets embedded as iframes (current-patch sets) and plain anchor
        links (prog, ultimates, criterion). Set names are fetched from xivgear.app
        to label iframe-embedded sets.
      parameters:
        - name: role
          in: path
          required: true
          description: Role slug used by The Balance
          schema:
            type: string
            enum: [tanks, healers, melee, ranged, casters]
          example: tanks
        - name: job
          in: path
          required: true
          description: Job slug used by The Balance
          schema:
            type: string
          example: warrior
      responses:
        "200":
          description: List of labeled xivgear.app links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BisLink"
              example:
                - label: "2.5"
                  url: "https://xivgear.app/?page=bis|war|current&selectedIndex=0"
                - label: "2.45"
                  url: "https://xivgear.app/?page=bis|war|current&selectedIndex=1"
                - label: "https://xivgear.app/#/bis/war/prog"
                  url: "https://xivgear.app/#/bis/war/prog"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /bis/sets:
    get:
      tags: [bis]
      summary: List available set names
      description: >
        Returns the ordered list of set names for a given xivgear.app URL.
        Use this to discover valid `set` values before calling `/bis` or `/compare`.
      parameters:
        - $ref: "#/components/parameters/XivgearUrl"
      responses:
        "200":
          description: Ordered list of set names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: ["2.5", "2.45"]
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /bis:
    get:
      tags: [bis]
      summary: Fetch a BIS gear set
      description: >
        Fetches and returns a normalized BIS gear set from xivgear.app.
        Results are cached in-memory by (url, set) for the lifetime of the process.


        `set` can be a set name (e.g. `2.5`) or a 0-based index (e.g. `0`).
        If omitted, defaults to the `selectedIndex` in the URL, then `0`.


        Hash-style xivgear URLs (`/#/bis/war/prog`) are automatically converted
        to the query-param style (`/?page=bis|war|prog`) before calling the API.
      parameters:
        - $ref: "#/components/parameters/XivgearUrl"
        - $ref: "#/components/parameters/SetParam"
      responses:
        "200":
          description: Normalized BIS gear set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BisGearSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /pcap/inventory:
    get:
      tags: [pcap]
      summary: Get latest inventory snapshot
      description: >
        Returns the most recently captured player inventory snapshot (bags 0–3
        and currency/crystal container 2000). Returns 404 if no snapshot has
        been captured yet.
      responses:
        "200":
          description: Latest captured inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySnapshot"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [pcap]
      summary: Store an inventory snapshot
      description: >
        Stores a new InventorySnapshot in memory. Called internally by the pcap
        child process; not intended for direct use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventorySnapshot"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /compare:
    get:
      tags: [compare]
      summary: Compare captured gear against BIS
      description: >
        Diffs the most recently packet-captured gear snapshot against a BIS set.
        Returns 409 if no gear has been captured yet.


        Each slot is assigned one of five statuses:

        - `match` — correct item and materia

        - `wrong-item` — different item equipped

        - `wrong-materia` — correct item but melds differ

        - `missing` — slot is empty but BIS requires an item

        - `bis-empty` — BIS has no item for this slot (e.g. off-hand for most jobs)


        Materia comparison ignores order and trailing empty slots.
      parameters:
        - $ref: "#/components/parameters/XivgearUrl"
        - $ref: "#/components/parameters/SetParam"
      responses:
        "200":
          description: Per-slot comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GearsetComparison"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: No gear snapshot available yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /needs:
    get:
      tags: [compare]
      summary: What the player needs to complete BIS
      description: >
        Computes what a player still needs to acquire or re-meld to complete a
        BIS set. Cross-references the comparison result against the latest
        inventory snapshot so each need shows how many of the item are already
        in the player's bags.


        Returns 409 if no gear snapshot has been captured yet. If no inventory
        snapshot exists, `quantityInBags` fields will be `0`.
      parameters:
        - $ref: "#/components/parameters/XivgearUrl"
        - $ref: "#/components/parameters/SetParam"
      responses:
        "200":
          description: Items and materia still needed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GearNeeds"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: No gear snapshot available yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /bis/full:
    get:
      tags: [compare]
      summary: Bundled BIS set + comparison + needs + acquisition
      description: >
        Single request that returns the BIS set, gear comparison, needs
        computation, and acquisition paths in one response. The UI uses this
        instead of calling `/bis`, `/compare`, `/needs`, and `/acquisition`
        separately. Returns 409 if no gear snapshot has been captured yet.
      parameters:
        - $ref: "#/components/parameters/XivgearUrl"
        - $ref: "#/components/parameters/SetParam"
      responses:
        "200":
          description: Bundled comparison data
          content:
            application/json:
              schema:
                type: object
                required: [bisSet, comparison, needs, acquisition]
                properties:
                  bisSet:
                    $ref: "#/components/schemas/BisGearSet"
                  comparison:
                    $ref: "#/components/schemas/GearsetComparison"
                  needs:
                    $ref: "#/components/schemas/GearNeeds"
                  acquisition:
                    type: array
                    items: { $ref: "#/components/schemas/SlotAcquisitionStatus" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: No gear snapshot available yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /upgrade-items:
    get:
      tags: [compare]
      summary: All upgrade-related items for the active raid tier
      description: >
        Returns all upgrade-related items (tomestones, coffers, upgrade
        materials, raid books) for the active raid tier, cross-referenced
        against the current inventory.  Unlike `/acquisition`, this endpoint
        does NOT filter by whether the player currently needs an item — every
        item defined in the acquisition map is returned.  `have` will be 0 if
        no inventory snapshot exists.
      responses:
        "200":
          description: Upgrade items grouped by category
          content:
            application/json:
              schema:
                type: object
                required: [currency, coffers, materials, books]
                properties:
                  currency:
                    type: array
                    items: { $ref: "#/components/schemas/UpgradeItem" }
                  coffers:
                    type: array
                    items: { $ref: "#/components/schemas/UpgradeItem" }
                  materials:
                    type: array
                    items: { $ref: "#/components/schemas/UpgradeItem" }
                  materia:
                    type: array
                    description: Materia still needed for BIS melds (only present when ?url= and gear are available)
                    items: { $ref: "#/components/schemas/UpgradeItem" }
                  books:
                    type: array
                    items: { $ref: "#/components/schemas/UpgradeItem" }
        "502":
          $ref: "#/components/responses/UpstreamError"

  # ---------------------------------------------------------------------------
  # Window controls (Electrobun desktop only)
  # ---------------------------------------------------------------------------

  /window/minimize:
    post:
      tags: [window]
      summary: Minimize window
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /window/maximize:
    post:
      tags: [window]
      summary: Maximize window
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /window/close:
    post:
      tags: [window]
      summary: Close window
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /window/frame:
    get:
      tags: [window]
      summary: Get window frame
      responses:
        "200":
          description: Current window position and size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WindowFrame"

  /window/setFrame:
    post:
      tags: [window]
      summary: Set window frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WindowFrame"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

# -----------------------------------------------------------------------------
# Reusable components
# -----------------------------------------------------------------------------

components:

  parameters:
    XivgearUrl:
      name: url
      in: query
      required: true
      description: A xivgear.app URL (from `/balance` or typed directly)
      schema:
        type: string
      example: "https://xivgear.app/?page=bis|war|current"

    SetParam:
      name: set
      in: query
      required: false
      description: >
        Set name (e.g. `2.5`) or 0-based index (e.g. `0`).
        Defaults to `selectedIndex` in the URL, then `0`.
      schema:
        type: string
      example: "2.5"

  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
                example: true

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Missing or invalid parameter
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UpstreamError:
      description: Upstream request to The Balance or xivgear.app failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UpgradeItem:
      type: object
      required: [itemId, name, have]
      properties:
        itemId:
          type: integer
        name:
          type: string
        icon:
          type: string
          nullable: true
          description: XIVAPI icon URL, or null if item data could not be resolved
        have:
          type: integer
          description: Quantity currently in the player's inventory (0 if no snapshot)

    # ---- Item ----------------------------------------------------------------

    ItemData:
      type: object
      properties:
        name:
          type: string
          example: "Vanguard's Blade"
        icon:
          type: string
          nullable: true
          example: "https://v2.xivapi.com/asset/ui/icon/..."
        itemLevel:
          type: integer
          example: 730
        materiaSlots:
          type: integer
          example: 2
        canOvermeld:
          type: boolean
          example: false

    # ---- Packet capture ------------------------------------------------------

    EquipmentPiece:
      type: object
      properties:
        itemId:
          type: integer
        hq:
          type: boolean
        materias:
          type: array
          items:
            type: integer
          description: Resolved materia item IDs (0 = empty slot)
        materiaSlots:
          type: integer
        canOvermeld:
          type: boolean

    GearSnapshot:
      type: object
      required: [capturedAt, items]
      properties:
        characterId:
          type: integer
        classId:
          type: integer
        capturedAt:
          type: string
          format: date-time
        items:
          type: object
          description: Keyed by SlotName
          additionalProperties:
            $ref: "#/components/schemas/EquipmentPiece"

    # ---- BIS -----------------------------------------------------------------

    BisLink:
      type: object
      required: [label, url]
      properties:
        label:
          type: string
          description: Human-readable set name or raw URL if no label found
          example: "2.5"
        url:
          type: string
          description: Full xivgear.app URL
          example: "https://xivgear.app/?page=bis|war|current&selectedIndex=0"

    BisItem:
      type: object
      required: [itemId, materias]
      properties:
        itemId:
          type: integer
          example: 49697
        materias:
          type: array
          items:
            type: integer
          description: Materia item IDs for this slot

    BisGearSet:
      type: object
      required: [name, job, source, items]
      properties:
        name:
          type: string
          example: "2.5"
        job:
          type: string
          example: "WAR"
        source:
          type: string
          description: The xivgear.app URL this set was fetched from
        foodId:
          type: integer
          description: Optional food item ID recommended for this set
        items:
          type: object
          description: Keyed by SlotName
          additionalProperties:
            $ref: "#/components/schemas/BisItem"

    # ---- Inventory -----------------------------------------------------------

    InventoryItem:
      type: object
      required: [itemId, quantity, hq, containerId, slot]
      properties:
        itemId:
          type: integer
        quantity:
          type: integer
        hq:
          type: boolean
        containerId:
          type: integer
          description: >
            Container ID: 0–3 = player bags, 2000 = currency/crystals
        slot:
          type: integer

    InventorySnapshot:
      type: object
      required: [capturedAt, items]
      properties:
        characterId:
          type: integer
        capturedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"

    # ---- Needs ---------------------------------------------------------------

    ItemNeed:
      type: object
      required: [slot, reason, bisItemId, quantityInBags]
      properties:
        slot:
          $ref: "#/components/schemas/SlotName"
        reason:
          type: string
          enum: [wrong-item, missing]
        bisItemId:
          type: integer
        equippedItemId:
          type: integer
        quantityInBags:
          type: integer
          description: How many of this item the player already has in their bags

    MateriaChange:
      type: object
      required: [slot, bisItemId, toAdd, toRemove, quantityInBags]
      properties:
        slot:
          $ref: "#/components/schemas/SlotName"
        bisItemId:
          type: integer
        toAdd:
          type: array
          items:
            type: integer
          description: Materia item IDs that need to be melded (in BIS but not equipped)
        toRemove:
          type: array
          items:
            type: integer
          description: Materia item IDs that are equipped but not in BIS (must be stripped first)
        quantityInBags:
          type: object
          additionalProperties:
            type: integer
          description: For each materia in toAdd, how many the player has in bags

    GearNeeds:
      type: object
      required: [itemNeeds, materiaChanges]
      properties:
        itemNeeds:
          type: array
          items:
            $ref: "#/components/schemas/ItemNeed"
        materiaChanges:
          type: array
          items:
            $ref: "#/components/schemas/MateriaChange"

    # ---- Comparison ----------------------------------------------------------

    SlotStatus:
      type: string
      enum: [match, wrong-item, wrong-materia, missing, bis-empty]

    SlotComparison:
      type: object
      required: [slot, status]
      properties:
        slot:
          $ref: "#/components/schemas/SlotName"
        status:
          $ref: "#/components/schemas/SlotStatus"
        equippedItemId:
          type: integer
        bisItemId:
          type: integer
        equippedMaterias:
          type: array
          items:
            type: integer
        bisMaterias:
          type: array
          items:
            type: integer

    GearsetComparison:
      type: object
      properties:
        matchCount:
          type: integer
        wrongItemCount:
          type: integer
        wrongMateriaCount:
          type: integer
        missingCount:
          type: integer
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotComparison"

    # ---- Catalog -------------------------------------------------------------

    RaidTier:
      type: string
      enum: [aac_lw, aac_mw, aac_hw, ultimate, criterion, other]
      description: >
        Content tier the BIS set targets.

        - `aac_lw` — AAC Light-heavyweight (M1–M4 Savage, patch 7.0)

        - `aac_mw` — AAC Middleweight (M5–M8 Savage, patch 7.2)

        - `aac_hw` — AAC Heavyweight (M9–M12 Savage, patch 7.4)

        - `ultimate` — Ultimate difficulty

        - `criterion` — Criterion / Criterion Savage

        - `other` — Anything else (prog sets, levelling, etc.)

    LocalBisEntry:
      type: object
      required: [id, url, setIndex, savedAt, set, raidTier]
      properties:
        id:
          type: string
          description: >
            Stable key derived from the xivgear page slug and set index,
            e.g. `"bis_war_current_0"`.
          example: "bis_war_current_0"
        url:
          type: string
          description: >
            Canonical xivgear.app URL with `selectedIndex` baked in.
          example: "https://xivgear.app/?page=bis|war|current&selectedIndex=0"
        setIndex:
          type: integer
          example: 0
        savedAt:
          type: string
          format: date-time
        set:
          $ref: "#/components/schemas/BisGearSet"
        raidTier:
          $ref: "#/components/schemas/RaidTier"

    BisCatalog:
      type: object
      required: [sets, preferences]
      properties:
        sets:
          type: array
          items:
            $ref: "#/components/schemas/LocalBisEntry"
        preferences:
          type: object
          description: >
            Maps uppercase job abbreviation (e.g. `"WAR"`) to the `id` of
            the preferred `LocalBisEntry` for that job.
          additionalProperties:
            type: string
          example:
            WAR: "bis_war_current_0"

    # ---- Shared --------------------------------------------------------------

    SlotName:
      type: string
      description: >
        Canonical gear slot identifier. `belt` was removed in Endwalker but is retained
        for packet compatibility (slot index 5 still exists in packets). It never appears
        in BIS sets and is excluded from all comparison logic.
      enum:
        - mainHand
        - offHand
        - head
        - chest
        - gloves
        - belt
        - legs
        - feet
        - earRings
        - necklace
        - bracelet
        - ring1
        - ring2
        - crystal

    WindowFrame:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
