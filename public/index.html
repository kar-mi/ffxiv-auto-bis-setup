<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFXIV Gear Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ffxiv: {
              gold:   "#c8a84b",
              dark:   "#0d0d0d",
              panel:  "#1a1a2e",
              border: "#2e2e4a",
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App shell -->
  <div id="app-shell" class="relative w-screen h-screen rounded-xl overflow-hidden bg-ffxiv-dark text-gray-200 font-sans flex flex-col border border-ffxiv-border">

    <!-- Resize handles -->
    <div class="fixed top-0      left-3      right-3  h-1.5 z-[60] cursor-n-resize"  data-dir="n"></div>
    <div class="fixed bottom-0   left-3      right-3  h-1.5 z-[60] cursor-s-resize"  data-dir="s"></div>
    <div class="fixed top-3      left-0      bottom-3 w-1.5 z-[60] cursor-w-resize"  data-dir="w"></div>
    <div class="fixed top-3      right-0     bottom-3 w-1.5 z-[60] cursor-e-resize"  data-dir="e"></div>
    <div class="fixed top-0      left-0      w-5 h-5  z-[61] cursor-nw-resize" data-dir="nw"></div>
    <div class="fixed top-0      right-0     w-5 h-5  z-[61] cursor-ne-resize" data-dir="ne"></div>
    <div class="fixed bottom-0   left-0      w-5 h-5  z-[61] cursor-sw-resize" data-dir="sw"></div>
    <div class="fixed bottom-0   right-0     w-5 h-5  z-[61] cursor-se-resize" data-dir="se"></div>

    <!-- Titlebar -->
    <div class="electrobun-webkit-app-region-drag shrink-0 h-9 bg-ffxiv-panel border-b border-ffxiv-border flex items-center justify-between select-none z-50 relative" style="border-bottom-color: rgba(200,168,75,0.2)">
      <span class="font-cinzel absolute left-1/2 -translate-x-1/2 text-xs font-semibold text-ffxiv-gold tracking-[0.2em] uppercase pointer-events-none">FFXIV Gear Setup</span>
      <div class="electrobun-webkit-app-region-no-drag flex h-full ml-auto">
        <button id="btn-settings" title="Settings"
          class="w-9 h-full flex items-center justify-center text-gray-500 hover:text-ffxiv-gold hover:bg-white/10 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-win-minimize" title="Minimize"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-colors text-base leading-none">
          &#x2013;
        </button>
        <button id="btn-win-maximize" title="Maximize"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-colors text-xs leading-none">
          &#x25A1;
        </button>
        <button id="btn-win-close" title="Close"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-white hover:bg-red-600 transition-colors leading-none rounded-tr-xl">
          &#x2715;
        </button>
      </div>
    </div>

    <div id="app-root" class="flex flex-col flex-1 min-h-0"></div>

  </div>

  <script src="bundle.js"></script>
</body>
</html>
