<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFXIV Gear Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ffxiv: {
              gold:   "#c8a84b",
              dark:   "#0d0d0d",
              panel:  "#1a1a2e",
              border: "#2e2e4a",
            },
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: transparent; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #2e2e4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c8a84b; }

    [data-tooltip] { position: relative; }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: #e5e7eb;
      border: 1px solid #2e2e4a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 200;
    }
    [data-tooltip]:hover::after { opacity: 1; }
  </style>
</head>
<body>

  <!-- App shell: rounded window frame -->
  <div id="app-shell" class="relative w-screen h-screen rounded-xl overflow-hidden bg-ffxiv-dark text-gray-200 font-sans flex flex-col border border-ffxiv-border">

    <!-- Resize handles (fixed to viewport so they always track window edges) -->
    <div class="fixed top-0      left-3      right-3  h-1.5 z-[60] cursor-n-resize"  data-dir="n"></div>
    <div class="fixed bottom-0   left-3      right-3  h-1.5 z-[60] cursor-s-resize"  data-dir="s"></div>
    <div class="fixed top-3      left-0      bottom-3 w-1.5 z-[60] cursor-w-resize"  data-dir="w"></div>
    <div class="fixed top-3      right-0     bottom-3 w-1.5 z-[60] cursor-e-resize"  data-dir="e"></div>
    <div class="fixed top-0      left-0      w-5 h-5  z-[61] cursor-nw-resize" data-dir="nw"></div>
    <div class="fixed top-0      right-0     w-5 h-5  z-[61] cursor-ne-resize" data-dir="ne"></div>
    <div class="fixed bottom-0   left-0      w-5 h-5  z-[61] cursor-sw-resize" data-dir="sw"></div>
    <div class="fixed bottom-0   right-0     w-5 h-5  z-[61] cursor-se-resize" data-dir="se"></div>

    <!-- Titlebar -->
    <div class="electrobun-webkit-app-region-drag shrink-0 h-9 bg-ffxiv-panel border-b border-ffxiv-border flex items-center justify-between select-none z-50 relative">
      <span class="absolute left-1/2 -translate-x-1/2 text-xs font-semibold text-ffxiv-gold tracking-[0.2em] uppercase pointer-events-none">FFXIV Gear Setup</span>
      <!-- Windows-style controls: minimize / maximize / close -->
      <div class="electrobun-webkit-app-region-no-drag flex h-full ml-auto">
        <button id="btn-win-minimize" title="Minimize"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-colors text-base leading-none">
          &#x2013;
        </button>
        <button id="btn-win-maximize" title="Maximize"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-colors text-xs leading-none">
          &#x25A1;
        </button>
        <button id="btn-win-close" title="Close"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-white hover:bg-red-600 transition-colors leading-none rounded-tr-xl">
          &#x2715;
        </button>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-4 py-6">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-bold text-ffxiv-gold tracking-wide">FFXIV Gear Setup</h1>
            <p class="text-gray-400 text-sm mt-1">Gear captured from the game client</p>
          </div>
          <button
            id="btn-refresh"
            class="px-4 py-2 text-sm rounded bg-ffxiv-panel border border-ffxiv-border text-gray-300 hover:border-ffxiv-gold hover:text-ffxiv-gold transition-colors"
          >
            Refresh
          </button>
        </div>

        <!-- BIS comparison controls -->
        <div id="bis-controls" class="mb-4 flex flex-wrap items-end gap-3">
          <div id="bis-link-wrap" class="flex flex-col gap-1 hidden">
            <label class="text-[10px] text-gray-500 uppercase tracking-wide">BIS Set</label>
            <select id="sel-bis-link" class="bg-ffxiv-panel border border-ffxiv-border text-gray-200 text-xs rounded px-2 py-1.5 focus:outline-none focus:border-ffxiv-gold">
              <option value="">— Select —</option>
            </select>
          </div>
          <button id="btn-compare" class="px-3 py-1.5 text-xs rounded bg-ffxiv-panel border border-ffxiv-border text-gray-300 hover:border-ffxiv-gold hover:text-ffxiv-gold transition-colors hidden">
            Compare
          </button>
          <button id="btn-manage-sets" class="px-3 py-1.5 text-xs rounded bg-ffxiv-panel border border-ffxiv-border text-gray-400 hover:border-ffxiv-gold hover:text-ffxiv-gold transition-colors">
            Manage Sets
          </button>
          <button id="btn-clear-compare" class="px-3 py-1.5 text-xs rounded bg-ffxiv-panel border border-ffxiv-border text-gray-400 hover:text-gray-200 transition-colors hidden">
            Clear
          </button>
        </div>


        <!-- Status message -->
        <p id="status" class="text-sm text-gray-400 mb-6 hidden"></p>

        <!-- Snapshot timestamp -->
        <p id="snapshot-meta" class="text-xs text-gray-500 mb-4 hidden"></p>

        <!-- Gear list -->
        <div id="gear-list" class="hidden space-y-2"></div>

        <!-- Acquisition panel -->
        <div id="acquisition-panel" class="hidden mt-6">
          <h3 class="text-xs font-semibold text-ffxiv-gold uppercase tracking-wide mb-3">Acquisition</h3>
          <div id="acquisition-summary" class="text-xs text-gray-400 mb-3"></div>
          <div id="acquisition-list" class="space-y-2"></div>
        </div>

      </div>
    </div>

    <!-- Manage BIS Sets modal -->
    <div id="manage-sets-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60">
      <div class="bg-ffxiv-panel border border-ffxiv-border rounded-xl w-[420px] max-w-[92vw] max-h-[85vh] overflow-y-auto p-5 relative shadow-xl">
        <button id="manage-sets-modal-close" class="absolute top-3 right-3 text-gray-500 hover:text-gray-200 text-lg leading-none">&#x2715;</button>
        <h2 class="text-sm font-semibold text-ffxiv-gold uppercase tracking-wide mb-4">Manage BIS Sets</h2>

        <!-- Tab switcher -->
        <div class="flex gap-0 border-b border-ffxiv-border mb-4">
          <button id="tab-btn-saved"
            class="px-3 pb-2 text-xs text-gray-200 border-b-2 border-ffxiv-gold -mb-px"
            data-tab="saved">Saved Sets</button>
          <button id="tab-btn-manual"
            class="px-3 pb-2 text-xs text-gray-500 border-b-2 border-transparent -mb-px hover:text-gray-300 transition-colors"
            data-tab="manual">Paste URL</button>
          <button id="tab-btn-balance"
            class="px-3 pb-2 text-xs text-gray-500 border-b-2 border-transparent -mb-px hover:text-gray-300 transition-colors"
            data-tab="balance">The Balance</button>
        </div>

        <!-- Saved Sets panel -->
        <div id="tab-panel-saved" class="flex flex-col gap-2">
          <div id="saved-sets-list" class="flex flex-col gap-1.5 max-h-72 overflow-y-auto"></div>
        </div>

        <!-- Paste URL panel -->
        <div id="tab-panel-manual" class="hidden flex-col gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-[10px] text-gray-500 uppercase tracking-wide">xivgear.app URL</label>
            <input id="input-xivgear-url" type="text"
              placeholder="https://xivgear.app/?page=bis|war|current&amp;selectedIndex=0"
              class="bg-ffxiv-dark border border-ffxiv-border text-gray-200 text-xs rounded px-2 py-1.5 focus:outline-none focus:border-ffxiv-gold w-full" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[10px] text-gray-500 uppercase tracking-wide">Raid Tier</label>
            <select id="sel-manual-tier" class="bg-ffxiv-dark border border-ffxiv-border text-gray-200 text-xs rounded px-2 py-1.5 focus:outline-none focus:border-ffxiv-gold">
              <option value="aac_hw">AAC Heavyweight (M9&ndash;M12)</option>
              <option value="aac_mw">AAC Middleweight (M5&ndash;M8)</option>
              <option value="aac_lw">AAC Light-heavyweight (M1&ndash;M4)</option>
              <option value="ultimate">Ultimate</option>
              <option value="criterion">Criterion</option>
              <option value="other">Other</option>
            </select>
          </div>
          <label class="flex items-center gap-2">
            <input type="checkbox" id="chk-manual-default" checked class="accent-ffxiv-gold w-3 h-3" />
            <span class="text-xs text-gray-300">Set as default for this job</span>
          </label>
          <button id="btn-manual-add"
            class="px-3 py-1.5 text-xs rounded bg-ffxiv-panel border border-ffxiv-gold text-ffxiv-gold hover:bg-ffxiv-gold/10 transition-colors">
            Add Set
          </button>
          <p id="manual-add-status" class="text-xs hidden"></p>
        </div>

        <!-- The Balance browser panel -->
        <div id="tab-panel-balance" class="hidden flex-col gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-[10px] text-gray-500 uppercase tracking-wide">Raid Tier (applied to all additions)</label>
            <select id="sel-balance-tier" class="bg-ffxiv-dark border border-ffxiv-border text-gray-200 text-xs rounded px-2 py-1.5 focus:outline-none focus:border-ffxiv-gold">
              <option value="aac_hw">AAC Heavyweight (M9&ndash;M12)</option>
              <option value="aac_mw">AAC Middleweight (M5&ndash;M8)</option>
              <option value="aac_lw">AAC Light-heavyweight (M1&ndash;M4)</option>
              <option value="ultimate">Ultimate</option>
              <option value="criterion">Criterion</option>
              <option value="other">Other</option>
            </select>
          </div>
          <button id="btn-load-balance"
            class="px-3 py-1.5 text-xs rounded bg-ffxiv-panel border border-ffxiv-border text-gray-300 hover:border-ffxiv-gold hover:text-ffxiv-gold transition-colors self-start">
            Load from The Balance
          </button>
          <div id="balance-links-list" class="flex flex-col gap-1.5 max-h-52 overflow-y-auto"></div>
        </div>
      </div>
    </div>

    <!-- Comparison modal -->
    <div id="compare-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60">
      <div class="bg-ffxiv-panel border border-ffxiv-border rounded-xl w-[520px] max-w-[90vw] max-h-[85vh] overflow-y-auto p-5 relative shadow-xl">
        <button id="modal-close" class="absolute top-3 right-3 text-gray-500 hover:text-gray-200 text-lg leading-none">&#x2715;</button>
        <h2 id="modal-slot-title" class="text-sm font-semibold text-ffxiv-gold uppercase tracking-wide mb-4"></h2>
        <div id="modal-body" class="flex gap-4"></div>
        <div id="modal-acquisition" class="hidden mt-4 pt-4 border-t border-ffxiv-border space-y-3"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
