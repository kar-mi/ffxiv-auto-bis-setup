<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFXIV Gear Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ffxiv: {
              gold:   "#c8a84b",
              dark:   "#0d0d0d",
              panel:  "#1a1a2e",
              border: "#2e2e4a",
            },
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: transparent; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>

  <!-- App shell: rounded window frame -->
  <div id="app-shell" class="relative w-screen h-screen rounded-xl overflow-hidden bg-ffxiv-dark text-gray-200 font-sans flex flex-col border border-ffxiv-border">

    <!-- Resize handles (absolute, inside rounded shell) -->
    <div class="absolute top-0      left-3      right-3  h-1.5 z-[60] cursor-n-resize"  data-dir="n"></div>
    <div class="absolute bottom-0   left-3      right-3  h-1.5 z-[60] cursor-s-resize"  data-dir="s"></div>
    <div class="absolute top-3      left-0      bottom-3 w-1.5 z-[60] cursor-w-resize"  data-dir="w"></div>
    <div class="absolute top-3      right-0     bottom-3 w-1.5 z-[60] cursor-e-resize"  data-dir="e"></div>
    <div class="absolute top-0      left-0      w-5 h-5  z-[61] cursor-nw-resize" data-dir="nw"></div>
    <div class="absolute top-0      right-0     w-5 h-5  z-[61] cursor-ne-resize" data-dir="ne"></div>
    <div class="absolute bottom-0   left-0      w-5 h-5  z-[61] cursor-sw-resize" data-dir="sw"></div>
    <div class="absolute bottom-0   right-0     w-5 h-5  z-[61] cursor-se-resize" data-dir="se"></div>

    <!-- Titlebar -->
    <div class="electrobun-webkit-app-region-drag shrink-0 h-9 bg-ffxiv-panel border-b border-ffxiv-border flex items-center justify-between select-none z-50 relative">
      <span class="absolute left-1/2 -translate-x-1/2 text-xs font-semibold text-ffxiv-gold tracking-[0.2em] uppercase pointer-events-none">FFXIV Gear Setup</span>
      <!-- Windows-style controls: minimize / maximize / close -->
      <div class="electrobun-webkit-app-region-no-drag flex h-full ml-auto">
        <button id="btn-win-minimize" title="Minimize"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-colors text-base leading-none">
          &#x2013;
        </button>
        <button id="btn-win-maximize" title="Maximize"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-colors text-xs leading-none">
          &#x25A1;
        </button>
        <button id="btn-win-close" title="Close"
          class="w-11 h-full flex items-center justify-center text-gray-500 hover:text-white hover:bg-red-600 transition-colors leading-none rounded-tr-xl">
          &#x2715;
        </button>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-4 py-6">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-bold text-ffxiv-gold tracking-wide">FFXIV Gear Setup</h1>
            <p class="text-gray-400 text-sm mt-1">Gear captured from the game client</p>
          </div>
          <button
            id="btn-refresh"
            class="px-4 py-2 text-sm rounded bg-ffxiv-panel border border-ffxiv-border text-gray-300 hover:border-ffxiv-gold hover:text-ffxiv-gold transition-colors"
          >
            Refresh
          </button>
        </div>

        <!-- Status message -->
        <p id="status" class="text-sm text-gray-400 mb-6 hidden"></p>

        <!-- Snapshot timestamp -->
        <p id="snapshot-meta" class="text-xs text-gray-500 mb-4 hidden"></p>

        <!-- Gear list -->
        <div id="gear-list" class="hidden space-y-2"></div>

      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
