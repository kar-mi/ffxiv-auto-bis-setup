<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFXIV Gear Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ffxiv: {
              gold:   "#c8a84b",
              dark:   "#0d0d0d",
              panel:  "#1a1a2e",
              border: "#2e2e4a",
            },
          },
        },
      },
    };
  </script>
</head>
<body class="bg-ffxiv-dark text-gray-200 min-h-screen font-sans">

  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-ffxiv-gold tracking-wide">FFXIV Gear Setup</h1>
        <p class="text-gray-400 text-sm mt-1">Gear captured from the game client</p>
      </div>
      <button
        id="btn-refresh"
        class="px-4 py-2 text-sm rounded bg-ffxiv-panel border border-ffxiv-border text-gray-300 hover:border-ffxiv-gold hover:text-ffxiv-gold transition-colors"
      >
        Refresh
      </button>
    </div>

    <!-- Status message -->
    <p id="status" class="text-sm text-gray-400 mb-6 hidden"></p>

    <!-- Snapshot timestamp -->
    <p id="snapshot-meta" class="text-xs text-gray-500 mb-4 hidden"></p>

    <!-- Gear list -->
    <div id="gear-list" class="hidden space-y-2"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
